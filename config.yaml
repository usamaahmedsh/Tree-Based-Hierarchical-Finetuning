# -----------------------------------------------------------
# Stage 1: Hierarchical Stratification Tree
# -----------------------------------------------------------
tree:
  # Grid search sample fraction (10–20% of corpus for calibration)
  grid_search_sample_fraction: 1.00

  # Hard floor: minimum documents per leaf node
  leaf_min_size: 30

  # Maximum tree depth (5 layers as per paper)
  max_depth: 5

  # BERTopic (Layer 1 — Topic / subject matter)
  bertopic:
    min_cluster_size: 10
    umap_n_neighbors: 10
    umap_n_components: 5
    hdbscan_min_samples: 5
    top_n_words: 10

  # GoEmotions (Layer 2 — Emotional tone)
  goemotions:
    model: "bhadresh-savani/bert-base-uncased-emotion"
    confidence_threshold: 0.3
    batch_size: 32

  # M3-Inference (Layer 3 — Demographic signals: gender, age)
  m3inference:
    confidence_threshold: 0.5

  # Dialect / Register (Layer 4 — Language variety)
  dialect:
    model: "textattack/bert-base-uncased-CoLA"  # formality proxy
    confidence_threshold: 0.4

  # Readability (Layer 5 — Complexity)
  readability:
    # Score bins for Flesch Reading Ease
    bins:
      - label: "Very Easy"
        min: 90
        max: 100
      - label: "Easy"
        min: 70
        max: 90
      - label: "Standard"
        min: 50
        max: 70
      - label: "Difficult"
        min: 30
        max: 50
      - label: "Very Difficult"
        min: 0
        max: 30

  # Tree visualization output
  visualization:
    output_dir: "outputs/tree_viz"
    image_format: "png"   # png or svg
    dpi: 150
    max_label_length: 40  # Truncate long labels in image
