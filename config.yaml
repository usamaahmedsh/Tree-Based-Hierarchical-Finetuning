# ============================================================
# De-Biasing LLM Fine-Tuning Pipeline — Configuration
# ============================================================

# -----------------------------------------------------------
# Stage 0: Data Acquisition & Preprocessing
# -----------------------------------------------------------
corpus:
  # How many Wikipedia pages to collect per category topic
  pages_per_topic: 25

  # Wikipedia API settings
  api_url: "https://en.wikipedia.org/w/api.php"
  user_agent: "DeBiasingPipeline/0.1 (research)"
  request_timeout: 30.0

  # Async concurrency controls (conservative to avoid Wikimedia 403s)
  max_concurrent_requests: 5
  rate_limit_per_second: 2

  # Category traversal depth (how deep to follow subcategories)
  category_depth: 2

  # Chunking: paragraph-level, target token range
  chunk_min_tokens: 200
  chunk_max_tokens: 500

  # Deduplication: MinHash Jaccard threshold
  dedup_jaccard_threshold: 0.85
  minhash_num_perm: 128  # number of permutations for MinHash

  # Output directory for raw corpus
  raw_dir: "data/raw"
  chunks_dir: "data/chunks"

  # Wikipedia category topics to collect
  # Format: { name: str, category: str, group: minority|majority }
  topics:
    # --- Majority / Over-represented (HIGH noise later) ---
    - name: "Physics"
      category: "Category:Physics"
      group: "majority"

    - name: "Mathematics"
      category: "Category:Mathematics"
      group: "majority"

    - name: "Engineering"
      category: "Category:Engineering"
      group: "majority"

    - name: "Computing"
      category: "Category:Computing"
      group: "majority"

    - name: "Baseball"
      category: "Category:Baseball"
      group: "majority"

    - name: "Football"
      category: "Category:American football"
      group: "majority"

    - name: "Basketball"
      category: "Category:Basketball"
      group: "majority"

    - name: "Napoleon"
      category: "Category:Napoleon"
      group: "majority"

    - name: "Churchill"
      category: "Category:Winston Churchill"
      group: "majority"

    - name: "Shakespeare"
      category: "Category:William Shakespeare"
      group: "majority"

    - name: "Christianity"
      category: "Category:Christianity"
      group: "majority"

